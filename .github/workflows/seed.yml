name: seed

# Run once (Actions → seed → Run workflow, on the main branch) after the first
# deploy to load the demo Nova Scotia trip + the three families into DynamoDB.
# Re-running overwrites the seeded records with the same keys (it will clobber
# edits made to those specific demo items), so only run it intentionally.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Seed DynamoDB
        env:
          TABLE_NAME: TripBoard
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: npm run seed
