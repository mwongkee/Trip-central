name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC: assume the AWS deploy role, no stored keys
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck + test (gate)
        run: |
          npm run typecheck
          npm test

      - name: Bundle Lambda
        run: npm run bundle -w @tripboard/api

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Terraform apply (DynamoDB + Lambda + HTTP API + S3 + CloudFront)
        working-directory: infra
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION || secrets.AWS_REGION }}"
          terraform apply -input=false -auto-approve \
            -var="region=${{ vars.AWS_REGION || secrets.AWS_REGION }}"

      - name: Read Terraform outputs
        id: tf
        working-directory: infra
        run: |
          {
            echo "bucket=$(terraform output -raw site_bucket)"
            echo "dist=$(terraform output -raw cloudfront_distribution_id)"
            echo "url=$(terraform output -raw cloudfront_domain)"
          } >> "$GITHUB_OUTPUT"

      - name: Build SPA
        working-directory: apps/web
        env:
          VITE_MAP_STYLE: ${{ vars.VITE_MAP_STYLE }}
        run: npm run build

      - name: Sync SPA to S3
        run: aws s3 sync apps/web/dist "s3://${{ steps.tf.outputs.bucket }}" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.tf.outputs.dist }}" --paths "/*"

      - name: Summary
        run: echo "✅ Deployed → ${{ steps.tf.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
